experiment:
  name: Ghostlight
  status: incubation
  phase: phase_0_scaffold
  premise: >
    Build a durable research and implementation home for socially persistent
    generative agents whose behavior emerges from latent state, culture,
    memory, perception, and incentives rather than flat persona prompts.

objective:
  primary: >
    Turn Ghostlight into a legible machine for persistent socially aware
    characters that can generate interactive branching scene trees for games,
    including speech and non-speech actions, propagate scene consequences into
    state and memory, and eventually support procedural
    storyline generation, psychologically grounded consumer behavior, and major
    faction decision-making without collapsing into prompt soup.
  current: >
    Move from hand-authored single-turn projection artifacts toward the first
    scene-local sequential dialogue tick: local awareness, action or dialogue
    choice, event proposal, conservative state mutation, and validation.

constraints:
  - Prefer explicit latent state over persona theater.
  - Culture should shape priors and incentives, not stamp out clones.
  - Prompt text is a projection surface, not the canonical store of truth.
  - Keep persistent state small enough to rehydrate without drowning the next session.
  - Reuse proven machinery where it fits before inventing ornate nonsense.
  - Do not treat an older corridor-crisis game slice as the active Ghostlight implementation target.
  - Cold Wake may be used as a pre-Elysium historical grounding fixture, but not as the active product target unless explicitly revived.
  - Do not use the obsolete Call of the Void colony-fleet return-home twist; current Aetheria canon sequesters the whole Solar system into Elysium.
  - Do not treat Elysium gameplay-era outcomes as single-history Sol facts; Elysium futures are conditional canon indexed by branch lineage.
  - Generate possible post-Rupture Elysium futures as reviewed `future_branch` training and evaluation material so models learn weird Elysium concepts as branch-local canonical histories.

invariants:
  - The map is canonical and slow-changing.
  - Scratch is temporary and disposable.
  - Evidence is durable and distilled.
  - Canonical agent state and per-agent perceived state must remain distinct.
  - Listener misread is part of the model, not an error to flatten away.
  - Personality must be modeled as layered organization, presentation, and situational activation, not just one bag of labels.
  - Authoring outputs must remain explainable in terms of state, relationship, pressure, memory, and goals.
  - Character generation should be agent-local: each acting turn should restrict context to what the character knows, feels, wants, remembers, hides, perceives, can attempt, and has authority to affect.
  - Aetheria single-history training data should come from authored historical lore; procedural Elysium scenes are conditional branch histories.
  - Post-Rupture future branches must distinguish source-backed Elysium concepts, generated branch assumptions, branch lineage, and sibling-branch exclusion boundaries.
  - Aetheria scene generation must check AetheriaLore source for factions, social movements, locations, time periods, species, body affordances, infrastructure, and material constraints before projection.
  - Soft judgments that cannot be wired as deterministic code should emit reviewed training artifacts instead of becoming permanent ad hoc rules.
  - Coordinator output must keep world and branch state shaped for future game-engine integration even while current coordination lives in authored imagination and glue prose.

data_flow:
  observe:
    - research notes
    - implementation artifacts
    - simulation requirements
    - setting constraints
    - AetheriaLore source context
  process:
    - rehydrate from canonical state
    - work one bounded organ
    - verify the seam that matters
    - distill only belief-changing evidence
    - commit or cut the branch
  cut:
    - kill machinery that does not visibly serve the core model
    - move volatile proof to git history or artifacts, not durable notes
    - remove active scenario assumptions when the user redirects the product target

active_subgoals:
  - Keep Ghostlight as the canonical home for its architecture notes so consumer projects do not quietly regrow duplicate brains.
  - Define the canonical agent state model, including first-class volatility, attachment-seeking, and distance-seeking.
  - Define how culture shapes priors, incentives, masks, and economic behavior without turning populations into clones.
  - Define the boundary between canonical signal, perceived signal, and prompt projection.
  - Support content generation for the Call of the Void slice in AetheriaLore and dialogue scaffolding or procedural drama for narrated Aetheria timeline stories.
  - Ground projection training in authored Aetheria historical flashpoints before using Ghostlight to generate Elysium branch history.

accepted_design:
  - Ghostlight owns the deeper agent-state, personality, culture, relationship, and prompt-projection architecture; other projects can remain consumers instead of shrines.
  - Personality is layered: underlying organization, stable dispositions, behavioral dimensions, presentation strategy, situational activation, relationship state, and goals or values.
  - The agent model must distinguish canonical state from per-agent perceived state.
  - Prompts are rendered projections of perceived state, active memory, and scene pressure; they are not the authoritative store of truth.
  - Culture acts as a prior-shaping and incentive field with distributions, covariance, scripts, reward gradients, taboo maps, and prestige structure.
  - Synthetic dialogue from known hidden state is a valid bootstrap source for training signal classifiers, but utterances themselves are not ground truth.
  - Performance, concealment, and mask maintenance are signal, not just obstruction.
  - The near-term Aetheria consumer is authoring support: Call of the Void content generation plus narrated timeline dialogue and procedural drama scaffolding.
  - Ghostlight should build drama and narrative pressure, then project character-local dialogue contexts so characters can breathe and act from their own partial state.
  - Call of the Void pressure should come from Sol's whole unresolved inheritance being trapped inside Elysium, not from a lone expedition discovering there is no way home.
  - The first schema contract lives in schemas/agent-state.schema.json with required first-class dimensions in schemas/agent-state.required-fields.json and a validator in tools/validate_agent_state.py.
  - Canonical authored character variables do not carry certainty; perceived dimensions do not expose canonical mean or plasticity, and instead model observed activation, attributed disposition, and confidence.
  - Fundamental attribution bias is first-class in perceived state: observers can mistake exceptional behavior for stable character, with stubborn reads emerging from confidence drivers such as memory, stakes, emotion, prejudice, and social reinforcement.
  - Voice style is a broad required communication vector covering lyrical speech, formality, verbosity, hedging, coded politeness, theatricality, dialect, register switching, technical compression, ritualized address, and related language mechanics.
  - Defensive verbal responses are derived during projection from underlying organization, dispositions, behavioral dimensions, presentation strategy, situational pressure, relationship context, and voice style rather than stored as a separate canonical layer.
  - Sarcastic deflection, sincerity evasion, emotional evasion, banter-as-boundary, and verbal aggression are target emergent behaviors for projection tests.
  - Dialogue context packs are positive-context payloads; unknown or author-only material is omitted rather than listed as forbidden context, while known secrets are handled through goals, memories, beliefs, and presentation constraints.
  - Relationship stance is directional; reciprocal agent pairs need separate edges because trust, fear, obligation, dependence, and betrayal expectations are not symmetric by default.
  - Prompt projection should compile state into actor-local awareness and pressure prose through input selection, active-pressure scoring, tension detection, response affordance derivation, projection controls, compact prompt rendering, and post-generation evaluation.
  - Projection must allow characters to act, not only speak; response turns can be dialogue, action, silence, withdrawal, violence, resource use, concealment, revelation, or mixed beats when state and scene pressure justify them.
  - Projection distillation is the long-term optimization path: a frontier teacher model generates reviewed projection artifacts, and a smaller student projector is trained only after the artifact schema, deterministic input slicer, and evaluator are stable.
  - Behavioral warmth and verbal warmth are separate axes: `interpersonal_warmth` describes social care or welcome, while `verbal_warmth` describes soft or reassuring language surface.
  - Events can carry lightweight observed exchange, private interpretation, and event-effect scaffolding so prompt projection can reason from appraisal and consequence without pretending the v0 schema is already a full transition engine.
  - Future social-simulation mechanisms should be documented and tested through projection artifacts before promotion into the canonical schema.
  - Projection examples use `ghostlight.projection_example.v0` JSONL records with traceable known facts, active pressures, tensions, response affordances, voice surface, rendered prompt text, and audit checks.
  - Aetheria projection training has three timeline lanes: historical grounded fixtures from authored lore, transition grounded fixtures around the Rupture/displacement, and future-branch Elysium fixtures that exercise post-Rupture concepts as conditional canon.
  - Lore grounding digests use `ghostlight.lore_grounding_digest.v0` records to distill authored lore into cultural pressure fields, factional misread maps, role pressures, speaker knowledge boundaries, and author-only exclusions.
  - The Cold Wake Panic is the first chosen historical grounding fixture: a draft Ganymede corridor digest now models thermal stealth panic, insurer category failure, Navigator rescue obligation, Lightsail reliability pressure, Aya-coded care pressure, pirate porosity, Cognitum firmware denial, and Cryonix/Rossum certification culture.
  - The Cold Wake story lab uses Maer Tidecall as protagonist across a four-scene arc: tribunal freeze, sanctuary intake, Callisto provenance, and convoy threshold. The first Qwen run produced a useful mixed action/dialogue beat and exposed a prompt weakness around unresolved personhood suspicion.
  - Projection controls are now first-class in projection examples: frame_controls, authority_boundaries, object_custody, required_semantics, and forbidden_resolutions capture failure lessons before prompt prose is rendered.
  - Qwen response captures are validated training receipts, not loose logs; accepted, rejected, and useful-needs-revision outputs should keep review status, response kind, strengths, failures, and pipeline lessons.
  - The first complete Cold Wake short story, The Narrowest Possible Margin, is assembled from Ghostlight projection receipts plus in-session connective narration.
  - Single-turn projection is a debug and training seam, not the final procedural-generation shape; the near-term runtime target is scene-local interactive dialogue generation with agents acting from local awareness, producing event proposals, and mutating bounded state.
  - Generated action should become an event proposal resolved by mutation authority, not direct unrestricted edits to world or other-agent private state.
  - Sequential runtime action primitives should stay concrete; ask, refuse, offer, reveal, conceal, and request are communicative intentions carried by actions, while listener interpretation remains separate and may be wrong.
  - Early fuzzy social updates should be manual reviewed training data, not brittle rule-based appraisals pretending to understand relationships before the corpus exists.
  - Scope boundary: implement interactive branching scene trees and scene-local consequences first; dialogue trees include speech and non-speech actions, while preserving training data hooks for open-world contexts, iterated decisions, economic behavior, scarcity, reputation, faction pressure, and institution decision-making.
  - Do not train dialogue-only models that will be useless for later game-world simulation; reviewed scene data should preserve why agents buy, refuse, trade, hoard, comply, defect, conceal, punish, or help when those decisions appear.
  - Branching scene generation should propose plausible protagonist choices, including speech, silence, movement, object use, concealment, revelation, withdrawal, violence, trade, or refusal, then record NPC responses and branch consequences such as trust loss or future hooks.
  - Ink is the standard branching scene format for playable interactive fiction; Ghostlight should project and annotate Ink scenes rather than inventing a parallel dialogue-tree language.
  - Ink sidecar training annotations preserve actor-local awareness, projection controls, branch rationale, action intent, reviewed consequences, and manual mutation policy while keeping Ink itself as the branch structure.
  - Qwen can generate Ink branch candidates from a Ghostlight local-awareness packet, but generated branches must be saved as reviewed captures and accepted as draft/training material before they become Ink or mutation input.
  - Character turns must be generated from character-local awareness only: protagonist choices are generated from protagonist-local state, then responder actions are generated from responder-local state plus observable protagonist action, not protagonist private intent.
  - Interaction turns are symmetrical: an actor acts, the action resolves into an event, every affected participant appraises and updates state, then the next actor is selected from the newly consolidated state.
  - Every meaningful scene event should update each affected character's state, memory, relationship stance, or perceived overlay through a reviewed mutation receipt; Ink variables remain playthrough-local and do not become canonical truth by accident.
  - The first sequential Qwen capture is useful-needs-revision training material because it separated actor and responder context but lacked the per-turn participant appraisal boundary and returned non-canonical action labels.
  - The second sequential Qwen capture validates the symmetrical turn shape behaviorally by producing canonical action labels and a non-speech Sella action, but still needs revision because prose prompting did not enforce array-typed JSON fields.
  - Qwen structured generation should use Ollama `/api/chat` with native tools, not `/api/generate` plus prose-only JSON instructions; Qwen's XML-shaped tool format is an internal chat-template/tool-call convention, not a reason to wrap Ghostlight artifacts in XML.
  - The local Qwen tool path works with thinking enabled, but nested arguments can still double-stringify, so the runner repairs known nested fields and preserves failures as reviewed captures.
  - The current sequential Qwen runner is scaffolding, not the final projection architecture: it still sends selected raw numeric state variables directly to the model.
  - A projector/state interpreter must sit between canonical agent state and Qwen prompts, translating numbers, memories, relationships, culture, and scene pressure into compact character-local operating context and affordances.
  - Character agents should not need to interpret `current_activation`, `plasticity`, or raw dimension scores; those belong to Ghostlight's internal state model and projector training data.
  - The first projected local context seam now exists as `ghostlight.projected_local_context.v0`: deterministic projection turns canonical state into character-local operating prose with audit refs while hiding raw state variables from prompt text.
  - The sequential Qwen runner now consumes projected local context instead of selected raw activation dictionaries.
  - The first projector-routed Qwen capture validates the architecture boundary but remains useful-needs-revision because Qwen still stringified a nested appraisal list field in one pass.
  - Projector-routed next-action prompts should receive appraisal context as prose constraints, not raw numeric state deltas from the appraisal artifact.
  - Failed sequential Qwen calls must still write reviewed receipts instead of exiting without evidence.
  - v8 and v9 projector-routed captures show Qwen tool-call reliability remains the blocker: malformed stringified tool arrays and no-tool-call dropouts can occur even when the projector seam is clean.
  - Thinking should be disabled by default for strict Qwen scene-generation tool calls; the v9 trace showed schema self-check looping that lasted minutes and ended with no tool call.
  - The first no-thinking projector-routed sequential run, v10, validated as accepted-as-draft with no repair or failure notes.
  - The accepted v10 projector-routed capture has been materialized into playable Ink, sidecar training annotation, reviewed mutation receipt, and a mutated Cold Wake fixture.
  - Materialized sequential captures should still keep fuzzy state, relationship, memory, and perceived-overlay changes manual and audited until classifiers exist.
  - Embodiment and interface affordances belong in projected local context, but Aetheria faction-specific affordances must be checked against lore source before projection; current Navigator source supports fluid architecture, acoustic signaling, soft navigation light, layered water motifs, communal orientation chambers, mixed-species translation/coexistence, specialized cetacean environments, and mixed wet/dry interface ergonomics.
  - Ghostlight's Aetheria generation doctrine is source-first and source-repairing: if a blocking lore gap appears while generating scenes or training data, patch AetheriaLore with a narrow elaboration before treating the detail as available to Ghostlight projection.
  - AetheriaLore now includes Navigator habitat and interface ergonomics for mixed wet/dry, acoustic, translation, and shared operational spaces, so future Navigator scenes should cite that source instead of improvising body affordances.
  - Source-checked Navigator retries v11-v17 improved Maer's generated action affordances but were not materialized; remaining blockers are object-custody semantics, valid appraisal/mutation paths, Qwen tool reliability, and prompt-constraint leakage into responder prose.
  - The soft organs are training targets: coordinator/story runtime, projector, character agent/responder, appraiser, state mutator, relationship/perception classifier, Aetheria responder, and later institution/faction/consumer decision models should all produce reviewed artifacts for future distillation or fine-tuning.
  - An Aetheria-tuned responder should learn lore, tone, factional preconceptions, species affordances, and institutional pressure from strong source-grounded responses spread throughout the timeline, but it still acts only inside Ghostlight's character-local context, deterministic gates, and mutation authority.
  - The coordinator is a trainable artifact: it glues scenes together, chooses next beats and acting agents, invokes specialist machinery, carries unresolved hooks, emits reviewed glue prose, and proposes world-state changes without bypassing deterministic gates.
  - The concrete training plan enumerates the trainable stages and their model families: generative decoder LLMs for coordinator/responder/soft structured outputs, classifiers or cross-encoders for appraisal/evaluation/relationship movement, retrieval models for memory and lore selection, and deterministic code for gates.
  - The timeline training plan now requires future-branch Elysium examples so the responder, coordinator, appraiser, and decision models learn post-Rupture concepts such as Aether, pseudospace, temporal nonlinearity, spirits, necrotech, mutable bodies, altered substrates, and weird institutions under branch-lineage labels.

current_status:
  summary: Ghostlight now has the Epiphany-style persistence spine, the first architecture payload, the v0 canonical agent-state schema seam, prompt projection docs, immediate schema fixes from evaluation, first reviewed Cat/Oz projection examples, a revised Aetheria lore-grounding architecture, a lore grounding digest schema, the first draft Cold Wake historical grounding digest, a Cold Wake story-lab fixture, projection controls, validated Qwen capture receipts, a complete Cold Wake short story assembled from accepted projection outputs, a hand-authored Ink-backed Cold Wake branching scene, the first Qwen-generated Ink draft materialized from local awareness with reviewed training annotations, the first reviewed sequential branch mutation that updates both Maer and Sella after a sanctuary intake beat, a v2 sequential Qwen capture proving the symmetrical turn shape produces better action behavior, a v5 sequential Qwen capture proving local thinking-plus-tools invocation works for the scene runner, the first projected-local-context seam that routes sequential prompts through character-local operating prose instead of raw state variables, tightened receipt handling for projector-routed Qwen failures, a default no-thinking policy for strict sequential tool calls, a v10 no-thinking projector-routed capture accepted as draft, the first materialized projector-routed sequential Ink scene with reviewed mutation training data, a source-checked embodiment/interface projection surface for Navigator scenes, a formal source-first Aetheria generation doctrine, v11-v17 source-checked retry receipts showing improved Maer embodiment plus remaining Sella response/prompt-leak blockers, a soft-model training artifact doctrine, a concrete training plan, and an explicit future-branch lane for generating possible post-Rupture Elysium futures as branch-local canon indexed by lineage.
  next_action: Define the coordinator artifact schema so future story passes capture next-beat choice, glue prose, world-state refs, branch flags, unresolved hooks, and machinery invocations as trainable data, then return to the Sella prompt/rendering fix.

  pruned_receipts:
    - Old prototype fixture receipts and local runner files were removed from the live workspace after their lessons were distilled into docs, state, evidence, and git history.

data_flow:
  - Rehydrate from map, handoff, system map, implementation plan, and `npm run state:status`.
  - Work one bounded organ.
  - Verify the seam that matters.
  - Add distilled evidence only when future belief changes.
  - Commit and push completed work.
  - If state grows faster than understanding, cut it back.

current_status:
  summary: Pallas Species Strikes is the current accepted-as-draft branch-and-fold IF fixture. The live workspace has been pruned to remove old prototype fixture receipts, stale runner tools, and model-runner experiment debris after their lessons were distilled into the architecture docs, state, evidence, and git history. The next build step is corpus-scale coverage rather than further archaeology.
  next_action: Add the corpus coverage ledger seam or select the next Aetheria fixture from the 100-150 broad coverage target.

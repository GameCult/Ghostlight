data_flow:
  - Rehydrate from map, handoff, system map, implementation plan, and `npm run state:status`.
  - Work one bounded organ.
  - Verify the seam that matters.
  - Add distilled evidence only when future belief changes.
  - Commit and push completed work.
  - If state grows faster than understanding, cut it back.

current_status:
  summary: Ghostlight has advanced the full Cold Wake story run two validated material turns beyond Sella opening the bay. Scene 06 has Maer accept Sella's bounded diagnostic-contact terms, extend live Navigator ledger exposure, open a preservation-only diagnostic acoustic channel, and route the rescue craft to wait for Sella's decon timing mark. Scene 07 has Sella lock preservation buffers, assign a minimal wet/dry staff pair, mark decon route Three, and let the bounded diagnostic sleeve cycle live. The current aftermath state is after-sella-timing-mark; the story is in motion but not complete.
  next_action: Continue from examples/agent-state.cold-wake-story-lab.after-sella-timing-mark.json. The next material beat should produce the first diagnostic signal/contact result from the vessel or sleeve without resolving personhood, ancestry, custody, provenance, or final rescue outcome too early. Preserve the established receipt set at material turns: projected context, responder packet, raw capture, leakage audit, reviewed mutation receipt, aftermath state, and readable coordinator story prose in experiments/cold-wake-story-lab/cold-wake-full-story-run.v0.md. Stop only for core invariant failures or schema break.

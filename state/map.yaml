  archived_receipts:
    - Archived local-model prototype captures remain under experiments/ and examples/ink/ for validation and lessons, not active steering.

data_flow:
  - Rehydrate from map, handoff, system map, implementation plan, and `npm run state:status`.
  - Work one bounded organ.
  - Verify the seam that matters.
  - Add distilled evidence only when future belief changes.
  - Commit and push completed work.
  - If state grows faster than understanding, cut it back.

current_status:
  summary: Ghostlight has produced its first no-fork research-enabled Sella responder capture and a reviewed state mutation receipt, with research provenance preserved in the raw responder output and mirrored in capture metadata.
  next_action: Tighten the research-enabled responder capture seam so future gold-data samples preserve auditable research traces, not only responder-reported consulted refs. The current research packet now uses seed scope plus bounded traversal for PSC, Jovian territory, resident factions, linked movements, politics, and technology context. Next, use a runner or worker protocol that returns explicit research trace data before generating the next sandboxed responder/coordinator sample from the updated Sella aftermath state.

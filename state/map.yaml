data_flow:
  - Rehydrate from map, handoff, system map, implementation plan, and `npm run state:status`.
  - Work one bounded organ.
  - Verify the seam that matters.
  - Add distilled evidence only when future belief changes.
  - Commit and push completed work.
  - If state grows faster than understanding, cut it back.

current_status:
  summary: `lucent-hostage-feed-v0` is the current open-ended training-loop draft. It uses a Lucent hostage-feed negotiation to exercise sequential projector, packet-only responder, event, participant appraisal, reviewed mutation, relationship/perception, and coordinator receipts across fifteen post-restart turns. The arc resolves with Juno on the safe line, security held, Sol assigned non-contact protective handoff, and evidence export unresolved as aftermath pressure. Pallas remains a reference fixture and `pallas-training-loop-v0` remains the first smaller receipt-chain pilot.
  next_action: Review the full Lucent arc and receipt chain, then decide whether to compile a branch/IF derivative, run specialist reviewers, or move to the next coverage fixture. Keep overall coverage at draft until branch/IF acceptance exists.

experiment:
  name: Ghostlight
  status: incubation
  phase: phase_0_scaffold
  premise: >
    Build a durable research and implementation home for socially persistent
    generative agents whose behavior emerges from personality, culture,
    memory, perception, incentives, and situation rather than flat persona
    prompts.

mission:
  primary: >
    Generate psychologically grounded branching scenes, dialogue, actions,
    social consequences, and eventually storylines, consumer behavior,
    faction decisions, and technology/item manifests for Aetheria.
  near_term: >
    Produce sandboxed, source-grounded branching-scene training data through
    projected local context, responder packets, reviewed outputs, mutation
    receipts, coordinator continuity, branch compiler artifacts, and IF review.
  voidbot_goal: >
    Keep the appraiser, relationship/perception updater, and memory machinery
    useful for VoidBot's core companion mission: reading specific humans over
    time, forming grounded opinions about them, noticing misreads, and updating
    trust, concern, irritation, respect, boundaries, and expectations from
    evidence rather than generic friendliness.
  active_fixture: >
    Pallas Species Strikes is the current pre-Elysium historical fixture. Cold
    Wake remains an archived prototype fixture, not the product target. Call of
    the Void and Elysium-era gameplay remain procedural consumer targets.

hard_boundaries:
  - Prompt text is projection, not truth storage.
  - Canonical agent state and per-agent perceived state must remain distinct.
  - Characters act from local knowledge, local perception, local pressure, and bounded affordances.
  - Aetheria prose must support tonal range and ordinary life, not only crisis pressure. Wit, warmth, domesticity, ritual, boredom, wonder, and quiet dread are valid state-grounded modes when they fit the scene.
  - Listener misread is first-class; intent and interpretation are not the same object.
  - Human-facing appraisal is a first-class target; VoidBot must be able to read people, form grounded opinions, and revise those opinions over repeated contact.
  - Generated action is an event proposal; deterministic gates and reviewed mutation decide what becomes state.
  - Fuzzy judgments become reviewed training artifacts before they become trained models.
  - Aetheria generation is source-first; check lore for factions, bodies, locations, institutions, and constraints before projection.
  - Do not import species-comfort assumptions across institutions. AU dry-operation cephalopod labor is bare-minimum productivity support, not Navigator-style or cephalopod-native comfort habitat, unless source lore says otherwise.
  - Elysium futures are branch-local canon indexed by lineage, not single-history Sol facts.
  - Technology exploration must emit game-usable item, component, assembly, supply-chain, compatibility, and provenance data mapped toward Aetheria-Economy.
  - Interactive-fiction fixtures should branch and fold: normalize most consequences into compact state variables and shared-scene conditionals, reserving isolated route splits for major world-changing divergence.
  - Interactive-fiction fixtures require independent artifact review before acceptance; tracked variables must materially affect later affordances, risk, appraisal, callbacks, visual state, or outcomes, unless explicitly marked telemetry-only.
  - Complete interactive-fiction fixtures must emit visual art direction for website imagery, with click-through visual scene segmentation, stable visual character refs for recurring named characters, a global style cue when the visual language matters, one durable base image prompt per distinct section, character visibility and stance controls, and additive modification prompts for branch-visible consequences and scene-state changes; assembled prompts include only actually visible character refs and do not use continuity notes as prompt text unless rewritten as concrete visible description.
  - Archived local-model prototype runners are receipts and plumbing tests, not the gold-data path.

live_architecture:
  state_model:
    - Layer personality through organization, disposition, behavior, presentation, situational activation, relationships, goals, and values.
    - Canonical authored state has no certainty; perceived overlays carry observed activation, attributed disposition, and confidence.
    - Voice style is a broad communication vector; defensive, comic, tender, ritual, poetic, dry, or evasive verbal behavior should emerge from state, circumstance, relationship, tonal mode, and presentation.
  projection:
    - Project canonical state into character-local operating context before any responder sees it.
    - Include scene facts, relevant memory, relationship read, stakes, embodiment/interface affordances, action affordances, projection controls, retrieved lore, tonal intent, ordinary-life texture, and latent pressure handling.
    - Hide raw state internals such as means, plasticity, current_activation, and numeric dimensions from prompt text.
  responder_packets:
    - `packet_only` tests runtime parity from curated source excerpts.
    - `retrieval_augmented` bakes setting texture into reviewed outputs through scoped retrieval.
    - `responder_scoped_repository_search` allows the responder to inspect declared seed scope, follow bounded relevant AetheriaLore links, and requires consulted refs, followed refs, research trace, plus research summary.
    - Gold responder data must preserve exact visible input, raw output, parsed/reviewed output, hidden-context refs, leakage audit, isolation method, and coordinator interventions.
  coordinator:
    - The coordinator is a trainable soft organ: it stages scenes, chooses next beats and acting agents, invokes specialist machinery, carries unresolved hooks, emits glue prose, and proposes game-engine-shaped state changes.
    - Glue prose is training signal, not canonical truth.
    - Coordinator prose should choose an intentional tonal mode for the scene and protect breathing room when the story needs routine, levity, domestic texture, wonder, or slow dread before consequence.
  branch_compiler:
    - The branch compiler turns fixture briefs, lore digests, scene/world state, actor-local branch candidates, reviewed consequence packets, fold plans, and visual continuity requirements into playable Ink plus training sidecars, separate visual plan artifacts when illustrated replay is in scope, and compiler notes.
    - The branch compiler owns playable structure, click-through segmentation, conditionals, variables, callbacks, fold materialization, visual scene ids, and image prompt handles; it stores visual prompt data in `.visual.json` artifacts rather than bloating training annotations; it does not own hidden character truth, participant appraisal, or durable social mutation.
  training_targets:
    - Coordinator/story runtime
    - Memory and lore retrieval
    - Projector/state interpreter
    - Character agent/responder
    - Participant appraiser
    - State mutator
    - Relationship/perception updater
    - Branch compiler for Ink materialization, fold/callback structure, sidecar generation, separate visual plan generation, and visual prompt handles
    - Interactive-fiction artifact reviewer for fake variables, cosmetic choices, missing state reads, fake folds, and visual callback gaps
    - Visual scene continuity reviewer for click-through segmentation, imagegen-ready prompts, character visibility, stance control, and branch/state visual modifiers
    - Human-facing appraisal and opinion model for VoidBot
    - Evaluator/review classifiers
    - Aetheria-tuned responder
    - Institution, faction, and consumer decision models

active_subgoals:
  - Keep Ghostlight focused on the architecture and data pipeline for socially persistent agents.
  - Build schema-stable, sandboxed responder, coordinator, branch compiler, and IF review data before chasing larger runtime loops.
  - Preserve Aetheria grounding through source-backed lore, branch labels, and reviewed assumptions.
  - Preserve Aetheria tonal range: Adams/Pratchett-style wit-with-stakes is a useful default touchstone, while other controlled modes remain valid when grounded in character, setting, and consequence.
  - Shape every soft judgment as future training data, not permanent prompt folklore.
  - Keep item/technology exploration database-shaped for Aetheria-Economy instead of prose-only worldbuilding, including colony-consumed manufactured trade goods, not only gear assemblies.
  - Track corpus coverage across all major factions, minor factions, movements, and flashpoints so no single fixture becomes the training universe by accident.

coverage_targets:
  current_lore_counts:
    major_powers: 12
    minor_powers: 21
    movements: 23
    pre_elysium_flashpoints: 24
    defunct_absorbed_powers: 5
  baseline_story_fixtures: 92
  baseline_with_defunct: 97
  practical_first_broad_target: 100-150 reviewed fixtures
  major_power_requirement: founding-era story plus day-in-the-life story
  collision_requirement: every coverage story should involve multiple cultures, factions, movements, institutions, or body/infrastructure assumptions colliding

